<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>NYT Books API</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
</head>

<body>

<h1>NYT Books API Explorer</h1>

<div class="menu">

<button onclick="getOverview()">Overview</button>

<!-- Selector de categoría -->
<h2>Search by Category</h2>

<select id="categorySelect">
<option value="hardcover-fiction">Hardcover Fiction</option>
<option value="paperback-nonfiction">Non Fiction</option>
<option value="childrens-middle-grade-hardcover">Children Books</option>
<option value="young-adult-hardcover">Young Adult</option>

</select>

<button onclick="loadCategory()">Load Category</button>

<div id="results"></div>
